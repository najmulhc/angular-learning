<p class="text-2xl font-bold text-gray-800 mb-6">
  Add New House
</p>

<form class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-lg space-y-4" (ngSubmit)="addHouse()">

  <!-- House Name -->
  <label class="block">
    <span class="text-gray-700 font-medium">House Name</span>
    <input
    [formField]="addHomeForm.name"
      id="name"
      type="text"
      class="mt-1 w-full rounded-lg border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
    />
  </label>

  <!-- Description -->
  <label class="block">
    <span class="text-gray-700 font-medium">House Description</span>
    <input
    [formField]="addHomeForm.description"
      id="description"
      type="text"
      class="mt-1 w-full rounded-lg border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
    />
  </label>

  <!-- Price -->
  <label class="block">
    <span class="text-gray-700 font-medium">House Price</span>
    <input
    [formField]="addHomeForm.price"
      id="price"
      type="number"
      class="mt-1 w-full rounded-lg border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
    />
  </label>

  <!-- Rooms + Toilets Grid -->
  <div class="grid grid-cols-2 gap-4">

    <label class="block">
      <span class="text-gray-700 font-medium">Rooms</span>
      <input
        [formField]="addHomeForm.rooms"
        type="number"
        class="mt-1 w-full rounded-lg border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
      />
    </label>

    <label class="block">
      <span class="text-gray-700 font-medium">Toilets</span>
      <input
        [formField]="addHomeForm.toilets"
        id="toilets"
        type="number"
        class="mt-1 w-full rounded-lg border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
      />
    </label>

  </div>

  <!-- State -->
  <label class="block">
    <span class="text-gray-700 font-medium">State</span>
    <input
      [formField]="addHomeForm.state"
      type="text"
      class="mt-1 w-full rounded-lg border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
    />
  </label>

  <!-- Photo -->
  <label class="block">
    <span class="text-gray-700 font-medium">Photo URL</span>
    <input
        [formField]="addHomeForm.photo"
      id="photo"
      type="text"
      class="mt-1 w-full rounded-lg border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
    />
  </label>

  <!-- WiFi -->
  <label class="flex items-center gap-2 text-gray-700">
    <input
      [formField]="addHomeForm.isWifiAvailable"
      id="hasWifi"
      type="checkbox"
      class="accent-green-600 w-4 h-4"
    />
    Has WiFi
  </label>

  <!-- Submit -->
  <button
    type="submit"
    class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg"
  >
    Add House
  </button>

</form>
