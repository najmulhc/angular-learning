
<header class="bg-gray-100 py-12 w-full mb-12 flex flex-col justify-center items-center gap-6">
  <h1 class="text-4xl font-bold text-center mb-8">Best homes for rent</h1>
  <p class="text-center text-gray-600 mb-12">Discover the best homes for rent in your area.</p>

  <div class="flex flex-wrap justify-center gap-3">
    <a routerLink="/add">
      <button class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded mt-4 hover:cursor-pointer">Add new House</button>
    </a>
    <a routerLink="/learn">
      <button class="bg-white hover:bg-green-50 text-green-700 border border-green-600 font-bold py-2 px-4 rounded mt-4 hover:cursor-pointer">Learn Angular with this project</button>
    </a>
  </div>
</header>
<div class="grid grid-cols-4 w-full gap-8 px-12 w-full">

@for( house of houses ; track house.name) {
  <app-housecards [house]="house"></app-housecards>
} 


</div>
